name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# ยกเลิก run เก่าของ branch เดียวกันเมื่อมี push ใหม่
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ESLint — กฎ react-hooks (deps ขาด/setState ใน effect) + react-refresh
      # (คนละเรื่องกับ typecheck: tsc จับ type ผิด, eslint จับ logic เหม็น)
      - name: Lint
        run: npm run lint

      # type-check (tsc --noEmit) — จับ type error ก่อนถึง prod
      - name: Type check
        run: npm run typecheck

      # vite build — ยืนยันว่า bundle production สร้างได้จริง (เหมือนที่ Vercel รัน)
      # ไม่ต้องใช้ VITE_API_URL ที่นี่ (ค่าจริงตั้งใน Vercel ตอน deploy)
      - name: Build
        run: npx vite build
